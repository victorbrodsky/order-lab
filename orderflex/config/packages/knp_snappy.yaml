#For ALma10 use:
#0) if pgdg13 error:
# a) sudo dnf config-manager --set-disabled pgdg13
# b) verify (optional): dnf repolist
# c) sudo dnf clean all
# d) sudo dnf makecache
#1) dnf install xwayland-run
#2) set wkhtmltopdfpathLinux to: xwfb-run -- /usr/local/bin/wkhtmltopdf
#3) Optional test: xwfb-run -- /usr/local/bin/wkhtmltopdf http://google.com test.pdf
# Note: The -- separator is required to distinguish between xwfb-run options and the wkhtmltopdf command

# Another option to use playwright:
# pip install playwright
# playwright install chromium


knp_snappy:
    process_timeout: 300 # In seconds
    temporary_folder: "%kernel.cache_dir%/snappy" #'%kernel.project_dir%/var/tmp/' #use different temp folder
    pdf:
        enabled:    true
        binary:     '%wkhtmltopdfpath%' #/usr/bin/xvfb-run /usr/bin/wkhtmltopdf #'%wkhtmltopdfpath%'   #"\"C:\\Program Files\\wkhtmltopdf\\bin\\wkhtmltopdf.exe\""
        #binary: '/usr/local/bin/wkhtmltopdf-wrapper.sh'
        options:
            javascript-delay: 9000 #9000    #Wait some milliseconds for javascript finish (default 200)
            load-error-handling: ignore
            load-media-error-handling: ignore
            enable-local-file-access: true
            enable-javascript: true
            no-stop-slow-scripts: true
            #window-status: 'ready' #fixing js delay
            #disable-external-links: true
            #debug-javascript: true
            #ignore-ssl-errors: true
            #no-stop-slow-scripts: true
            #disable-smart-shrinking: true
            #custom-header: 'Host: localhost'
                #- 'Host: localhost'
                #- 'X-Forwarded-Proto: http'


