parameters:

    tma.sitename: tma
    tma.uploadpath:


twig:
    globals:
        tma_sitename: '%tma.sitename%'
        #service
        #tma_util: "@tma_util"


services:
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        public: true       # Allows optimizing the container by removing unused services; this also means
#                                    # fetching services directly from the container via $container->get() won't work.
                                    # The best practice is to be explicit about your dependencies anyway.

    tma_authentication_handler:
        class: App\CtpTmaBundle\Security\Authentication\TmaLoginSuccessHandler

    tma_role_voter:
        class: App\CtpTmaBundle\Security\Voter\TmaRoleVoter
        public: false
        tags:
            - { name: security.voter }

    tma_permission_voter:
        class: App\CtpTmaBundle\Security\Voter\TmaPermissionVoter
        public: false
        tags:
            - { name: security.voter }

