parameters:

    regulatoryt.sitename: regulatoryt
    regulatoryt.uploadpath:


twig:
    globals:
        regulatoryt_sitename: '%regulatoryt.sitename%'


services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: true

    regulatoryt_authentication_handler:
        class: App\RegulatorytBundle\Security\Authentication\RegulatorytLoginSuccessHandler

    regulatoryt_role_voter:
        class: App\RegulatorytBundle\Security\Voter\RegulatorytRoleVoter
        public: false
        tags:
            - { name: security.voter }

    regulatoryt_permission_voter:
        class: App\RegulatorytBundle\Security\Voter\RegulatorytPermissionVoter
        public: false
        tags:
            - { name: security.voter }
